apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: boardgameapp-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: boardgameapp.local   
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: boardgameapp-service
                port:
                  number: 3000